# =========================
# Keyboard identity
# =========================
CONFIG_ZMK_KEYBOARD_NAME="MonClavier"

# =========================
# Bluetooth (principal)
# =========================
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# =========================
# USB (debug + fallback)
# =========================
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y

# =========================
# Logging (DEBUG IMPORTANT)
# =========================
CONFIG_ZMK_LOG_LEVEL_DBG=y

# =========================
# Key scanning
# =========================
CONFIG_ZMK_KSCAN=y

# =========================
# (OPTIONNEL) Décommente plus tard
# =========================

